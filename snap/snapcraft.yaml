name: flutter-skill
base: core22
version: '0.7.5'
summary: AI Agent Bridge for Flutter Apps
description: |
  Flutter Skill is a bridge that connects AI agents (Claude, Cursor, Windsurf)
  to running Flutter applications via the Dart VM Service Protocol.

  It enables agents to:
  - Inspect UI structure and widget properties
  - Perform actions (tap, scroll, enter text)
  - Take screenshots and verify visual changes
  - Navigate and interact with the app

  **MCP Configuration:**
  Add to your AI agent's MCP config:
  {
    "mcpServers": {
      "flutter-skill": {
        "command": "flutter-skill",
        "args": ["server"]
      }
    }
  }

grade: stable
confinement: strict

architectures:
  - build-on: amd64
  - build-on: arm64

parts:
  flutter-skill:
    plugin: nil
    source: .
    build-packages:
      - curl
      - unzip
    override-build: |
      # Install Flutter SDK
      FLUTTER_VERSION="3.27.4"
      curl -fsSL "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz" -o flutter.tar.xz
      tar xf flutter.tar.xz -C /opt
      rm flutter.tar.xz
      export PATH="/opt/flutter/bin:/opt/flutter/bin/cache/dart-sdk/bin:$PATH"

      # Get dependencies and compile
      flutter pub get
      dart compile exe bin/flutter_skill.dart -o $CRAFT_PART_INSTALL/bin/flutter-skill
    stage-packages:
      - libgcc-s1
      - libc6

apps:
  flutter-skill:
    command: bin/flutter-skill
    plugs:
      - network
      - network-bind
      - home
